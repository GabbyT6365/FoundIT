<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>Report Lost Item | FoundIT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="report-page">

  <!-- TOP BAR -->
  <header class="report-topbar">
    <a href="index.html" class="logo home-logo-link">
    <img src="images/salaming logo.png" alt="FoundIT logo">
    <h1>FoundIT</h1>
</a>
    </div>

  </header>

  <main class="report-main">
    <section class="report-card">

      <button class="report-close-top" onclick="cancelReport()">✕</button>

      <!-- LEFT PREVIEW -->
      <div class="report-left">
        <div class="report-preview-box">
          <img id="previewImage" class="report-preview-media" alt="Preview" style="display:none;">
          <video id="previewVideo" class="report-preview-media" controls style="display:none;"></video>
          <p id="previewPlaceholder" class="preview-placeholder">No file selected</p>
        </div>

        <label class="upload-label" for="fileInput">Upload photo or video</label>
        <input type="file" id="fileInput" accept="image/*,video/*">
      </div>

      <!-- RIGHT FORM -->
      <div class="report-right">
        <h2 class="report-title">Report a Lost Item</h2>

        <label for="itemName">Item Name</label>
        <input id="itemName" type="text" class="report-input" placeholder="Enter item name">

        <label for="location">Location</label>
        <input id="location" type="text" class="report-input" placeholder="Where was it lost?">

        <label for="reportEmail">STI Email</label>
        <input id="reportEmail" type="email" class="report-input" placeholder="example@stihub.com">

        <label for="studentId">Student ID</label>
        <input id="studentId" type="text" class="report-input" placeholder="0123456789">

      <label>Time</label>
      <div class="report-time-row">
     <input id="reportDate" type="date" class="report-input">
    <input id="reportTime" type="time" class="report-input">
</div>
<label>Report Type</label>

<label>
  <input type="radio" name="reportType" value="lost" required>
  I lost this item
</label>

<label>
  <input type="radio" name="reportType" value="found" required>
  I found this item
</label>

        <div class="report-buttons">
          <button type="button" class="report-cancel-btn" onclick="cancelReport()">Cancel</button>
          <button type="button" class="report-submit-btn" onclick="submitReport()">Submit</button>
        </div>
      </div>

    </section>
  </main>

  <div id="reportToast" class="report-toast">
    Your report has been submitted. Please wait for confirmation.
  </div>

  <script>
let uploadedReportFileData = "";

function cancelReport() {
    const returnPage = localStorage.getItem("reportReturnPage") || "dashboard.html";
    window.location.href = returnPage;
}

function submitReport() {
    const itemName = document.getElementById("itemName")?.value.trim();
    const location = document.getElementById("location")?.value.trim();
    const reportEmail = document.getElementById("reportEmail")?.value.trim();
    const studentId = document.getElementById("studentId")?.value.trim();
    const reportDate = document.getElementById("reportDate")?.value;
    const reportTime = document.getElementById("reportTime")?.value;

    if (!itemName || !location || !reportEmail || !studentId || !reportDate || !reportTime || !uploadedReportFileData) {
        alert("Please complete all fields and upload a photo or video first.");
        return;
    }

    if (!document.querySelector('input[name="reportType"]:checked')) {
    alert("Please select if the item is lost or found.");
    return;
}

    const reportType = document.querySelector('input[name="reportType"]:checked')?.value;

const newItem = {
    id: Date.now(),
    title: itemName,
    desc: `Reported by: ${studentId}`,
    location: location,
    email: reportEmail,
    date: reportDate,
    time: reportTime,
    media: uploadedReportFileData,
    claimedBy: "",
    reportType: reportType,
    status: "pending"
};

    const existingItems = JSON.parse(localStorage.getItem("reportedItems")) || [];
    existingItems.push(newItem);
    localStorage.setItem("reportedItems", JSON.stringify(existingItems));

    if (reportType === "found") {
    alert("Please bring the found item to the Lost & Found section at the D.O. (Disciplinary Office).");
} else {
    alert("Your lost item report has been submitted. Please wait for admin approval.");
}

    const toast = document.getElementById("reportToast");

    if (toast) {
        toast.classList.add("show");

        setTimeout(() => {
            toast.classList.remove("show");
        }, 2500);

        setTimeout(() => {
            cancelReport();
        }, 3000);
    } else {
        cancelReport();
    }
}


window.addEventListener("DOMContentLoaded", function () {
    const fileInput = document.getElementById("fileInput");
    const previewImage = document.getElementById("previewImage");
    const previewVideo = document.getElementById("previewVideo");
    const previewPlaceholder = document.getElementById("previewPlaceholder");

    if (fileInput) {
        fileInput.addEventListener("change", function () {
            const file = this.files[0];
            if (!file) return;

            const reader = new FileReader();

            reader.onload = function (e) {
                uploadedReportFileData = e.target.result;

                if (file.type.startsWith("image/")) {
                    previewImage.src = uploadedReportFileData;
                    previewImage.style.display = "block";
                    previewVideo.style.display = "none";
                    previewVideo.src = "";
                    previewPlaceholder.style.display = "none";
                } else if (file.type.startsWith("video/")) {
                    previewVideo.src = uploadedReportFileData;
                    previewVideo.style.display = "block";
                    previewImage.style.display = "none";
                    previewImage.src = "";
                    previewPlaceholder.style.display = "none";
                }
            };

            reader.readAsDataURL(file);
        });
    }
});
</script>
</body>
</html>
