<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="style.css">
  <title>FoundIT | Admin Login</title>
</head>
<body class="student-page">

<header class="navbar">
    <div class="logo">
        <img src="images/salaming logo.png" alt="FoundIT logo">
        <span>FoundIT</span>
    </div>

    <nav class="nav-links">
        <a href="about.html">About us</a>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<section class="student-container">

    <!-- LEFT LOGO -->
    <div class="left-panel">
        <img src="images/foundit_logo.png.jpg" class="big-logo" alt="FoundIT logo">
    </div>

    <!-- RIGHT FORM -->
    <div class="login-card">

        <h2 class="login-title">ADMIN LOGIN</h2>

        <form class="login-form" onsubmit="return false;">
            <input type="text" id="admin-id" placeholder="Admin ID" required>
            <input type="password" id="password" placeholder="Password" required>

            <p id="loginError" class="login-error"></p>

            <button type="button" class="login-btn" onclick="adminLogin()">
                Login
            </button>

            <button type="button" class="office-btn" disabled>
                Login with Office 365
            </button>
        </form>

    </div>

</section>

<script>
    let uploadedReportFileData = "";
    
function adminLogin() {
    const adminId = document.getElementById("admin-id").value.trim();
    const password = document.getElementById("password").value.trim();
    const error = document.getElementById("loginError");

    const ADMIN_ID = "admin";
    const ADMIN_PASSWORD = "1234";

    if (adminId === ADMIN_ID && password === ADMIN_PASSWORD) {
        localStorage.setItem("userRole", "admin");
        localStorage.setItem("adminLoggedIn", "true");
        window.location.href = "admin-dashboard.html";
    } else {
        error.textContent = "Invalid Admin ID or Password.";
    }
}

document.addEventListener("DOMContentLoaded", function () {
    const adminIdInput = document.getElementById("admin-id");
    const passwordInput = document.getElementById("password");

    function handleEnter(event) {
        if (event.key === "Enter") {
            adminLogin();
        }
    }

    adminIdInput.addEventListener("keydown", handleEnter);
    passwordInput.addEventListener("keydown", handleEnter);
});
</script>

</body>
</html>
