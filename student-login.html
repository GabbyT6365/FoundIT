<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="style.css">
  <title>FoundIT | Student Login</title>

</head>
<body class="student-page">

<header class="navbar">
    <div class="logo">
        <img src="images/foundit_trans.png.png" alt="FoundIT logo">
        <span>FoundIT</span>
    </div>

    <nav class="nav-links">
        <a href="about.html">About us</a>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
        <a href="login.html">Login</a>
    </nav>
</header>

<section class="student-container">

    <!-- LEFT LOGO -->
    <div class="left-panel">
        <img src="images/foundit_logo.png.jpg" class="big-logo">
    </div>

    <!-- RIGHT FORM -->
    <div class="login-card">

        <h2 class="login-title">STUDENT LOGIN</h2>

        <form class="login-form">
            <input type="email" id="email" placeholder="Student Number" required>
            <input type="password" id="password" placeholder="Password" required>

            <button type="button" onclick="loginUser()" class="login-btn">
                Login
            </button>

            <button type="button" class="office-btn">
                Login with Office 365
            </button>
        </form>

    </div>

</section>

</body>
