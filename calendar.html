<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoundIT | Calendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page">

  <header class="dashboard-header">
    <div class="dashboard-header-inner">
      <div class="header-left">
        <img src="images/salaming logo.png" alt="FoundIT Logo" class="small-logo" />
        <h1>FoundIT</h1>
      </div>

  </header>

  <main class="calendar-page-layout">

    <aside class="sidebar">
      <h2 class="role">ADMIN</h2>
      <nav class="side-nav">
        <a href="admin-dashboard.html" class="nav-btn active">Home</a>
        <a href="#">About Us</a>
        <a href="report.html">Report</a>
        <a href="contact.html">Contact</a>
      </nav>
    </aside>

    <section class="calendar-main">
      <div class="calendar-month-bar">
        <button class="month-arrow">&#8249;</button>
        <h2>March</h2>
        <button class="month-arrow">&#8250;</button>
      </div>

      <div class="calendar-board">
        <div class="calendar-weekdays">
          <div>Sun</div>
          <div>Mon</div>
          <div>Tues</div>
          <div>Wed</div>
          <div>Thurs</div>
          <div>Fri</div>
          <div>Sat</div>
        </div>

        <div class="calendar-grid-large">
          <div class="calendar-day">1</div>
          <div class="calendar-day">2</div>
          <div class="calendar-day event-green">3</div>
          <div class="calendar-day event-green">4</div>
          <div class="calendar-day">5</div>
          <div class="calendar-day">6</div>
          <div class="calendar-day">7</div>

          <div class="calendar-day">8</div>
          <div class="calendar-day">9</div>
          <div class="calendar-day event-red">10</div>
          <div class="calendar-day event-red">11</div>
          <div class="calendar-day">12</div>
          <div class="calendar-day double-red">13</div>
          <div class="calendar-day">14</div>

          <div class="calendar-day">15</div>
          <div class="calendar-day">17</div>
          <div class="calendar-day">18</div>
          <div class="calendar-day">19</div>
          <div class="calendar-day">20</div>
          <div class="calendar-day">21</div>
          <div class="calendar-day">22</div>

          <div class="calendar-day">22</div>
          <div class="calendar-day">23</div>
          <div class="calendar-day">24</div>
          <div class="calendar-day">25</div>
          <div class="calendar-day">26</div>
          <div class="calendar-day">27</div>
          <div class="calendar-day">28</div>

          <div class="calendar-day">29</div>
          <div class="calendar-day">30</div>
          <div class="calendar-day">31</div>
          <div class="calendar-day muted">1</div>
          <div class="calendar-day muted">2</div>
          <div class="calendar-day muted">3</div>
          <div class="calendar-day muted">4</div>
        </div>
      </div>
    </section>

    <aside class="right-panel">
      <div class="schedule-card">
        <h3>Schedule</h3>
        <label><input type="radio"> Claim of "Blue notebook" tomorrow</label>
        <label><input type="radio"> Claim of "Leather Wallet" by March 11, 2026</label>
        <label><input type="radio"> Claim of "Blue Glasses" by March 9, 2026</label>
        <label><input type="radio"> Claim of "H&amp;M Cotton shirt" by March 8, 2026</label>
      </div>
    </aside>

  </main>
</body>
</html>
